name: Release Build
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to package and publish
        required: true
        type: string

jobs:
  build:
    name: Release Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
      REGISTRY_PASS: ${{ secrets.REGISTRY_PASS }}
    steps:
      - uses: actions/checkout@v5
      - id: variables
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          git fetch --prune --unshallow
          echo "ref=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: env.REGISTRY_USER != '' && env.REGISTRY_PASS != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASS }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Publish container to GHCR
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/activity-relay:${{ steps.variables.outputs.ref }}
      - name: Publish container to Docker Hub
        if: env.REGISTRY_USER != '' && env.REGISTRY_PASS != ''
        uses: docker/build-push-action@v6
        with:
          push: true
          context: .
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.REGISTRY_USER }}/activity-relay:${{ steps.variables.outputs.ref }}

  debian-package:
    name: Build native Debian package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    services:
      redis:
        image: redis:7-alpine
        ports:
          # Avoid colliding with redis-server installed by the package smoke test.
          - 6381:6379
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential debhelper devscripts golang-any lintian

      - name: Set package version from tag
        env:
          DEBEMAIL: noreply@github.com
          DEBFULLNAME: thystra
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          version="${RELEASE_TAG#v}"
          version="${version/-/~}"
          dpkg --validate-version "$version"
          current_version="$(dpkg-parsechangelog --show-field Version)"
          if [ "$current_version" != "$version" ]; then
            dch --newversion "$version" --distribution noble \
              "Release ${RELEASE_TAG}."
          fi

      - name: Run application tests
        env:
          REDIS_URL: redis://127.0.0.1:6381
        run: go test -p 1 ./...

      - name: Build package
        run: dpkg-buildpackage --build=binary --no-sign

      - name: Inspect and lint package
        run: |
          package="$(find .. -maxdepth 1 -name 'activity-relay_*_amd64.deb' -print -quit)"
          test -n "$package"
          dpkg-deb --info "$package"
          dpkg-deb --contents "$package"
          lintian --fail-on error "$package"

      - name: Test clean install and identity preservation
        run: |
          set -euxo pipefail
          package="$(find .. -maxdepth 1 -name 'activity-relay_*_amd64.deb' -print -quit)"
          sudo apt-get install --yes --no-install-recommends "$package"
          test -x /usr/bin/relay
          test -f /etc/activity-relay/config.yml.example
          test ! -e /etc/activity-relay/config.yml
          test "$(stat --format='%a' /etc/activity-relay/actor.pem)" = 600
          test "$(stat --format='%U:%G' /etc/activity-relay/actor.pem)" = activity-relay:activity-relay
          /usr/bin/relay generate-key --output /etc/activity-relay/actor.pem 2>/dev/null && exit 1 || true
          actor_hash="$(sha256sum /etc/activity-relay/actor.pem)"
          sudo dpkg --install "$package"
          test "$(sha256sum /etc/activity-relay/actor.pem)" = "$actor_hash"
          test ! -e /etc/systemd/system/multi-user.target.wants/activity-relay-server.service
          test ! -e /etc/systemd/system/multi-user.target.wants/activity-relay-worker.service
          test ! -e /etc/systemd/system/timers.target.wants/activity-relay-resource-guard.timer

      - name: Prepare release assets
        run: |
          mkdir -p dist
          package="$(find .. -maxdepth 1 -name 'activity-relay_*_amd64.deb' -print -quit)"
          cp "$package" dist/
          cd dist
          sha256sum ./*.deb > SHA256SUMS

      - uses: actions/upload-artifact@v5
        with:
          name: activity-relay-debian-amd64
          path: dist/
          if-no-files-found: error

      - name: Attach package to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" --generate-notes
          fi
